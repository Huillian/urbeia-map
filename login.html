<!DOCTYPE html>
<!-- Design intent: clean auth entry point, Google-first, same dark aesthetic -->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="assets/img/urbeia-icon.png" />
  <meta name="theme-color" content="#0a0a0e" />
  <title>Entrar · Urbeia Map</title>
  <meta name="description" content="Entrar no Urbeia Map para cadastrar e gerenciar caixas de abelhas sem ferrão." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="canonical" href="https://map.urbeia.com.br/login.html" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <script src="assets/js/theme.js"></script>

  <style>
    body { overflow: auto; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }

    .auth-card {
      width: 100%;
      max-width: 380px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px 32px;
    }

    .auth-header { text-align: center; margin-bottom: 32px; }

    .auth-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px; height: 48px;
      background: var(--orange);
      border-radius: 14px;
      font-size: 24px;
      margin-bottom: 16px;
    }

    .auth-title {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 24px;
      color: var(--text);
      letter-spacing: -0.01em;
      margin-bottom: 6px;
    }

    .auth-title em { color: var(--orange); }

    .auth-sub {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* Google button */
    .btn-google {
      width: 100%;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #fff;
      color: #1f1f1f;
      font-size: 14px;
      font-weight: 500;
      font-family: var(--font-sans);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 20px;
    }

    .btn-google:hover { background: #f1f1f1; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .btn-google:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-google svg { flex-shrink: 0; }

    /* Divider */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      color: var(--text-muted);
      font-size: 11px;
      font-family: var(--font-mono);
      letter-spacing: 0.06em;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Form */
    .auth-form { display: flex; flex-direction: column; gap: 12px; }

    .auth-input {
      width: 100%;
      padding: 11px 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .auth-input::placeholder { color: var(--text-muted); }
    .auth-input:focus { border-color: var(--orange); }

    .btn-auth-submit {
      width: 100%;
      padding: 12px;
      background: var(--orange);
      color: #0a0a0e;
      font-weight: 700;
      font-size: 14px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: var(--font-sans);
      transition: all 0.2s;
    }

    .btn-auth-submit:hover:not(:disabled) {
      box-shadow: 0 6px 18px rgba(255,107,53,0.4);
      transform: translateY(-1px);
    }

    .btn-auth-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Toggle login/register */
    .auth-toggle {
      text-align: center;
      margin-top: 16px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .auth-toggle button {
      background: none;
      border: none;
      color: var(--orange);
      cursor: pointer;
      font-size: 13px;
      font-family: var(--font-sans);
      text-decoration: underline;
      padding: 0;
    }

    /* Messages */
    .auth-msg {
      font-family: var(--font-mono);
      font-size: 11px;
      text-align: center;
      letter-spacing: 0.04em;
      min-height: 16px;
      padding: 8px 0 0;
    }

    .auth-msg.success { color: var(--green); }
    .auth-msg.error   { color: #fca5a5; }

    .auth-back {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: none;
      font-family: var(--font-mono);
      letter-spacing: 0.04em;
    }

    .auth-back:hover { color: var(--text); }
  </style>
</head>
<body>

<button class="btn-theme" id="btn-theme" style="position:fixed;top:16px;right:16px;z-index:100;"></button>

<div class="auth-card">
  <div class="auth-header">
    <div class="auth-logo" aria-hidden="true">🐝</div>
    <h1 class="auth-title">Urbeia <em>Map</em></h1>
    <p class="auth-sub" id="auth-sub">Entre para cadastrar e gerenciar suas caixas.</p>
  </div>

  <!-- Google -->
  <button class="btn-google" id="btn-google" type="button">
    <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
      <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
      <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.909-2.258c-.806.54-1.837.86-3.047.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
      <path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/>
      <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/>
    </svg>
    Continuar com Google
  </button>

  <div class="auth-divider">ou</div>

  <!-- Email form -->
  <form class="auth-form" id="auth-form" novalidate>
    <label for="auth-email" style="position:absolute;width:1px;height:1px;overflow:hidden;">Email</label>
    <input type="email" class="auth-input" id="auth-email" placeholder="seu@email.com" autocomplete="email" required />

    <label for="auth-password" style="position:absolute;width:1px;height:1px;overflow:hidden;">Senha</label>
    <input type="password" class="auth-input" id="auth-password" placeholder="senha" autocomplete="current-password" required minlength="6" />

    <button type="submit" class="btn-auth-submit" id="btn-submit">Entrar</button>
  </form>

  <p class="auth-msg" id="auth-msg" role="status"></p>

  <div class="auth-toggle">
    <span id="toggle-text">Não tem conta?</span>
    <button type="button" id="btn-toggle">Criar conta</button>
  </div>

  <a href="index.html" class="auth-back">← voltar ao mapa</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-client.js"></script>
<script>
  // Determine where to redirect after login
  const params   = new URLSearchParams(location.search);
  const nextPage = params.get('next') || 'index.html';

  // If already logged in, redirect immediately
  window.urbeiaDB.getSession().then(session => {
    if (session) location.replace(nextPage);
  });

  // Google
  document.getElementById('btn-google').addEventListener('click', async () => {
    const btn = document.getElementById('btn-google');
    btn.disabled = true;
    btn.textContent = 'Redirecionando...';
    try {
      await window.urbeiaDB.signInWithGoogle(`${location.origin}/${nextPage}`);
    } catch (err) {
      showMsg('Erro ao conectar com Google.', 'error');
      btn.disabled = false;
      btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.909-2.258c-.806.54-1.837.86-3.047.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z"/></svg> Continuar com Google`;
    }
  });

  // Email/password toggle
  let isRegister = false;

  document.getElementById('btn-toggle').addEventListener('click', () => {
    isRegister = !isRegister;
    document.getElementById('btn-submit').textContent   = isRegister ? 'Criar conta' : 'Entrar';
    document.getElementById('toggle-text').textContent  = isRegister ? 'Já tem conta?' : 'Não tem conta?';
    document.getElementById('btn-toggle').textContent   = isRegister ? 'Fazer login' : 'Criar conta';
    document.getElementById('auth-sub').textContent     = isRegister ? 'Crie sua conta para gerenciar suas caixas.' : 'Entre para cadastrar e gerenciar suas caixas.';
    document.getElementById('auth-password').autocomplete = isRegister ? 'new-password' : 'current-password';
    document.getElementById('auth-msg').textContent = '';
  });

  // Submit
  document.getElementById('auth-form').addEventListener('submit', async e => {
    e.preventDefault();
    const email    = document.getElementById('auth-email').value.trim();
    const password = document.getElementById('auth-password').value;
    const btn      = document.getElementById('btn-submit');

    if (!email || !password) return;

    btn.disabled = true;
    btn.textContent = isRegister ? 'Criando conta...' : 'Entrando...';
    document.getElementById('auth-msg').textContent = '';

    try {
      if (isRegister) {
        await window.urbeiaDB.signUp(email, password);
        showMsg('Conta criada! Verifique seu e-mail para confirmar.', 'success');
      } else {
        await window.urbeiaDB.signInWithEmail(email, password);
        location.replace(nextPage);
      }
    } catch (err) {
      const msgs = {
        'Invalid login credentials': 'E-mail ou senha incorretos.',
        'Email not confirmed':        'Confirme seu e-mail antes de entrar.',
        'User already registered':    'E-mail já cadastrado. Faça login.',
      };
      showMsg(msgs[err.message] || err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = isRegister ? 'Criar conta' : 'Entrar';
    }
  });

  function showMsg(text, type) {
    const el = document.getElementById('auth-msg');
    el.textContent = text;
    el.className = `auth-msg ${type}`;
  }
</script>

</body>
</html>
